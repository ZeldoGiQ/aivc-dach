<!--
  Promo-Clip Template (30 Sekunden)
  Variablen: {{BRAND_NAME}}, {{HOOK}}, {{FEATURE_1}}, {{FEATURE_2}}, {{FEATURE_3}}, {{CTA_TEXT}}, {{LOGO_PATH}}
-->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --primary: {{PRIMARY_COLOR}};
    --accent: {{ACCENT_COLOR}};
    --bg: {{BACKGROUND_COLOR}};
    --text: {{TEXT_COLOR}};
    --font-heading: '{{FONT_HEADING}}', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 1920px; height: 1080px;
    background: var(--bg);
    font-family: var(--font-heading);
    overflow: hidden;
    position: relative;
    color: var(--text);
  }
  
  .scene { position: absolute; inset: 0; opacity: 0; }
  
  /* Hook (0-5s) */
  .hook {
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 0 200px;
    animation: fadeIn 0.4s ease-out 0s forwards, fadeOut 0.4s ease-in 4.6s forwards;
  }
  .hook-text {
    font-size: 140px; font-weight: 900;
    line-height: 1.05; letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: scaleIn 0.6s ease-out 0.1s forwards;
    transform: scale(0.9);
    opacity: 0;
  }
  
  /* Features (5-20s) */
  .features { 
    padding: 120px;
    animation: fadeIn 0.4s ease-out 5s forwards, fadeOut 0.4s ease-in 19.6s forwards;
  }
  .features-title { 
    font-size: 64px; font-weight: 800;
    margin-bottom: 80px; text-align: center;
    color: var(--text);
  }
  .features-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 48px;
  }
  .feature-card {
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--primary);
    border-radius: 24px;
    padding: 48px;
    opacity: 0;
    transform: translateY(40px);
  }
  .feature-card:nth-child(1) { animation: cardSlideIn 0.6s ease-out 5.5s forwards; }
  .feature-card:nth-child(2) { animation: cardSlideIn 0.6s ease-out 5.9s forwards; }
  .feature-card:nth-child(3) { animation: cardSlideIn 0.6s ease-out 6.3s forwards; }
  .feature-icon {
    font-size: 80px; margin-bottom: 24px;
  }
  .feature-text {
    font-size: 36px; font-weight: 700;
    line-height: 1.3;
  }
  
  /* Social Proof (20-25s) */
  .social-proof {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    animation: fadeIn 0.4s ease-out 20s forwards, fadeOut 0.4s ease-in 24.6s forwards;
  }
  .proof-number {
    font-size: 240px; font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 24px;
  }
  .proof-label {
    font-size: 48px; font-weight: 600;
  }
  
  /* CTA (25-30s) */
  .cta {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    animation: fadeIn 0.4s ease-out 25s forwards;
  }
  .cta-button {
    background: var(--primary);
    color: var(--bg);
    padding: 32px 80px;
    border-radius: 100px;
    font-size: 64px; font-weight: 800;
    box-shadow: 0 0 60px var(--primary);
    animation: pulse 1.2s ease-in-out 25.5s infinite;
  }
  .brand-footer {
    margin-top: 40px;
    font-size: 32px;
    opacity: 0.7;
  }
  
  /* Animations */
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
  @keyframes scaleIn { 
    to { opacity: 1; transform: scale(1); } 
  }
  @keyframes cardSlideIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
</style>
</head>
<body>
  <div class="scene hook">
    <div class="hook-text">{{HOOK}}</div>
  </div>
  
  <div class="scene features">
    <div class="features-title">Das kann {{BRAND_NAME}}</div>
    <div class="features-grid">
      <div class="feature-card">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">{{FEATURE_1}}</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🎯</div>
        <div class="feature-text">{{FEATURE_2}}</div>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🚀</div>
        <div class="feature-text">{{FEATURE_3}}</div>
      </div>
    </div>
  </div>
  
  <div class="scene social-proof">
    <div class="proof-number">10.000+</div>
    <div class="proof-label">zufriedene Nutzer</div>
  </div>
  
  <div class="scene cta">
    <div class="cta-button">{{CTA_TEXT}}</div>
    <div class="brand-footer">{{BRAND_NAME}}</div>
  </div>
</body>
</html>
