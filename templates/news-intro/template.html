<!--
  News-Intro Template (10 Sekunden)
  Variablen: {{BRAND_NAME}}, {{TOPIC}}, {{SUBTITLE}}, {{LOGO_PATH}}
  Brand-Vars aus brand.config.json: --primary, --accent, --bg, --text, --font-heading
-->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --primary: {{PRIMARY_COLOR}};
    --accent: {{ACCENT_COLOR}};
    --bg: {{BACKGROUND_COLOR}};
    --text: {{TEXT_COLOR}};
    --font-heading: '{{FONT_HEADING}}', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 1920px; height: 1080px;
    background: var(--bg);
    font-family: var(--font-heading);
    overflow: hidden;
    position: relative;
  }
  
  /* Hintergrund-Glow */
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: glowPulse 10s ease-in-out forwards;
    filter: blur(80px);
  }
  
  /* Szene 1: Logo-Reveal (0-2s) */
  .logo-scene {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: logoIn 2s ease-out forwards, logoOut 0.5s ease-in 1.8s forwards;
  }
  .logo-scene img { 
    width: 400px; height: auto;
    filter: drop-shadow(0 0 30px var(--primary));
  }
  .logo-scene .brand-name {
    color: var(--text);
    font-size: 72px;
    font-weight: 800;
    text-align: center;
    margin-top: 24px;
    letter-spacing: -0.02em;
  }
  
  /* Szene 2: Topic-Card (2-8s) */
  .topic-card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateY(30px);
    opacity: 0;
    animation: cardIn 0.6s ease-out 2s forwards, cardOut 0.5s ease-in 7.5s forwards;
    width: 1400px;
    text-align: center;
  }
  .topic-label {
    display: inline-block;
    padding: 12px 32px;
    background: var(--accent);
    color: var(--bg);
    font-size: 28px;
    font-weight: 700;
    border-radius: 100px;
    margin-bottom: 32px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .topic-title {
    color: var(--text);
    font-size: 96px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .topic-subtitle {
    color: var(--text);
    opacity: 0.7;
    font-size: 36px;
    font-weight: 400;
    line-height: 1.4;
  }
  
  /* Szene 3: Outro (8-10s) */
  .outro {
    position: absolute;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: outroIn 0.5s ease-out 8s forwards;
    color: var(--text);
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .outro .accent { color: var(--accent); }
  
  /* Animationen */
  @keyframes glowPulse {
    0% { opacity: 0; }
    20% { opacity: 0.6; }
    50% { opacity: 0.3; }
    100% { opacity: 0.4; }
  }
  @keyframes logoIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes logoOut {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
  }
  @keyframes cardIn {
    0% { opacity: 0; transform: translate(-50%, -50%) translateY(30px); }
    100% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
  }
  @keyframes cardOut {
    0% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
    100% { opacity: 0; transform: translate(-50%, -50%) translateY(-30px); }
  }
  @keyframes outroIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
</style>
</head>
<body>
  <div class="glow"></div>
  
  <div class="logo-scene">
    {{#if LOGO_PATH}}<img src="{{LOGO_PATH}}" alt="Logo">{{/if}}
    <div class="brand-name">{{BRAND_NAME}}</div>
  </div>
  
  <div class="topic-card">
    <div class="topic-label">News</div>
    <div class="topic-title">{{TOPIC}}</div>
    <div class="topic-subtitle">{{SUBTITLE}}</div>
  </div>
  
  <div class="outro">
    <span class="accent">{{BRAND_NAME}}</span> · Aktuell
  </div>
</body>
</html>
